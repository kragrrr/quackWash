name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main # Change this if your default branch is 'master' or another name

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
      
    # Add any build steps here if needed (e.g., npm install & npm run build)
    
    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Optional: Specify the local folder to upload if you only want to upload a build directory (e.g., 'dist/' or 'build/')
        # local-dir: ./dist/ 
        # Optional: Exclude specific files or directories
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**