name: Build and Deploy to cPanel

on:
  push:
    branches:
      - main # Change to 'master' if that is your default branch name

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install
        
    - name: Build project
      run: npm run build
      
    - name: Sync files to cPanel via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        # This ensures ONLY the compiled Vite production files are uploaded
        local-dir: ./dist/ 
        # This uploads directly to the /public_html folder!
        server-dir: ./public_html/
